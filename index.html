<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0c10;
    --bg2:      #0d1117;
    --bg3:      #111520;
    --border:   #1e2530;
    --text:     #e8eaf0;
    --muted:    #6b7280;
    --dim:      #4b5563;
    --green:    #22c55e;
    --green2:   #34d399;
    --green-bg: #064e3b;
    --red:      #ef4444;
    --red2:     #f87171;
    --red-bg:   #450a0a;
    --blue:     #3b82f6;
    --blue2:    #60a5fa;
    --orange:   #f97316;
  }

  body {
    font-family: 'IBM Plex Sans Thai', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, var(--bg2) 0%, #161b24 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 24px;
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; gap: 10px;
  }
  .logo {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, var(--blue), #06b6d4);
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -.5px; color: #f0f4ff; }

  /* ── Tabs ── */
  .tabs {
    display: flex; gap: 4px;
    padding: 12px 24px 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }
  .tab-btn {
    padding: 8px 18px; border-radius: 6px 6px 0 0;
    border: none; border-top: 2px solid transparent;
    cursor: pointer; font-family: inherit; font-size: 13px;
    font-weight: 400; color: var(--muted);
    background: transparent; transition: all .15s;
  }
  .tab-btn.active {
    font-weight: 600; color: var(--blue2);
    background: var(--bg); border-top-color: var(--blue);
  }

  /* ── Body ── */
  .body { padding: 20px 16px; max-width: 900px; margin: 0 auto; }

  /* ── Cards ── */
  .grid3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 16px; }
  .card {
    background: var(--bg3); border-radius: 12px;
    padding: 16px 18px; position: relative; overflow: hidden;
  }
  .card-accent { position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .card-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .card-value { font-size: 22px; font-weight: 700; letter-spacing: -1px; }
  .card-sub { font-size: 11px; color: var(--dim); margin-top: 4px; }

  /* ── Form Card ── */
  .form-card {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 14px; padding: 20px; margin-bottom: 16px;
  }
  .form-title { font-size: 14px; font-weight: 600; color: #9ca3af; margin-bottom: 14px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  label { font-size: 11px; color: var(--muted); margin-bottom: 4px; display: block; letter-spacing: .5px; }
  input, select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 12px; color: var(--text);
    font-size: 13px; font-family: inherit; outline: none;
  }
  select { cursor: pointer; }
  .btn-row { display: flex; gap: 8px; margin-top: 14px; }
  .btn {
    flex: 1; padding: 10px 0; border-radius: 8px; border: none;
    cursor: pointer; font-family: inherit; font-weight: 600; font-size: 13px;
    color: #fff; transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-income  { background: linear-gradient(135deg, #065f46, #059669); }
  .btn-expense { background: linear-gradient(135deg, #7f1d1d, #dc2626); }

  /* ── Period Nav ── */
  .period-nav {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 16px; margin-bottom: 16px;
  }
  .period-nav button {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    color: #9ca3af; cursor: pointer; padding: 4px 12px; font-size: 13px; font-family: inherit;
  }
  .period-nav button:disabled { opacity: .3; cursor: default; }
  .period-label { font-size: 14px; font-weight: 600; color: var(--text); }

  /* ── Table ── */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    padding: 10px 12px; text-align: left;
    color: var(--muted); font-weight: 500; font-size: 11px;
    text-transform: uppercase; letter-spacing: .8px;
    border-bottom: 1px solid var(--border);
  }
  th.right, td.right { text-align: right; }
  tr:nth-child(even) { background: var(--bg2); }
  td { padding: 10px 12px; border-bottom: 1px solid var(--bg3); }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 20px;
    font-size: 11px; font-weight: 600;
  }
  .badge-income  { background: var(--green-bg); color: var(--green2); }
  .badge-expense { background: var(--red-bg);   color: var(--red2); }
  .del-btn {
    background: none; border: none; cursor: pointer;
    color: var(--dim); font-size: 14px; padding: 2px 6px; border-radius: 4px;
  }
  .del-btn:hover { color: var(--red2); }

  /* ── Bar Chart ── */
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .bar-tag { width: 36px; font-size: 10px; text-align: right; flex-shrink: 0; }
  .bar-bg { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .4s ease; }
  .bar-val { width: 90px; font-size: 11px; color: #9ca3af; text-align: right; flex-shrink: 0; }

  /* ── Section Title ── */
  .section-title {
    font-size: 12px; font-weight: 600; color: #374151;
    text-transform: uppercase; letter-spacing: 1.5px;
    margin: 20px 0 12px;
  }
  hr { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .empty { color: #374151; text-align: center; padding: 40px 0; font-size: 13px; }

  /* ── Cat breakdown grid ── */
  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .cat-row { margin-bottom: 10px; }
  .cat-row-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px; }

  .color-green { color: var(--green2); }
  .color-red   { color: var(--red2); }
  .color-blue  { color: var(--blue2); }
  .color-orange{ color: var(--orange); }
  .color-muted { color: #9ca3af; }

  /* hidden panels */
  .panel { display: none; }
  .panel.active { display: block; }

  @media(max-width:600px){
    .grid3 { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .cat-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">💰</div>
  <h1>บัญชีรายรับ-รายจ่าย</h1>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('daily')">รายวัน</button>
  <button class="tab-btn" onclick="switchTab('monthly')">รายเดือน</button>
  <button class="tab-btn" onclick="switchTab('yearly')">รายปี</button>
</div>

<div class="body">
  <!-- DAILY -->
  <div id="panel-daily" class="panel active">
    <div class="period-nav">
      <button onclick="shiftDay(-1)">← ก่อนหน้า</button>
      <span class="period-label" id="day-label"></span>
      <button onclick="shiftDay(1)">ถัดไป →</button>
    </div>

    <div class="grid3" id="day-cards"></div>

    <!-- Form -->
    <div class="form-card">
      <div class="form-title">✏️ บันทึกรายการ</div>
      <div class="form-grid">
        <div>
          <label>วันที่</label>
          <input type="date" id="f-date" />
        </div>
        <div>
          <label>จำนวนเงิน (บาท)</label>
          <input type="number" id="f-amount" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div>
          <label>หมวดหมู่</label>
          <select id="f-cat">
            <optgroup label="รายรับ">
              <option>เงินเดือน</option><option>โบนัส</option>
              <option>ขายของ</option><option>ลงทุน</option><option>อื่นๆ</option>
            </optgroup>
            <optgroup label="รายจ่าย">
              <option>อาหาร</option><option>เดินทาง</option><option>ที่พัก</option>
              <option>สุขภาพ</option><option>บันเทิง</option><option>ช้อปปิ้ง</option>
              <option>สาธารณูปโภค</option><option>อื่นๆ</option>
            </optgroup>
          </select>
        </div>
        <div>
          <label>หมายเหตุ</label>
          <input type="text" id="f-note" placeholder="รายละเอียด..." />
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-income"  onclick="addRecord('income')">+ บันทึกรายรับ</button>
        <button class="btn btn-expense" onclick="addRecord('expense')">− บันทึกรายจ่าย</button>
      </div>
    </div>

    <div class="section-title">📋 รายการวันที่เลือก</div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th>ประเภท</th><th>หมวดหมู่</th><th>หมายเหตุ</th>
        <th class="right">จำนวน</th><th class="right">ยอดสะสม</th><th></th>
      </tr></thead>
      <tbody id="day-tbody"></tbody>
    </table></div>

    <hr />
    <div class="section-title">📒 ประวัติทั้งหมด</div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th>วันที่</th><th>ประเภท</th><th>หมวดหมู่</th><th>หมายเหตุ</th>
        <th class="right">จำนวน</th><th class="right">ยอดสะสม</th><th></th>
      </tr></thead>
      <tbody id="all-tbody"></tbody>
    </table></div>
  </div>

  <!-- MONTHLY -->
  <div id="panel-monthly" class="panel">
    <div class="period-nav">
      <button id="m-prev" onclick="shiftPeriod('monthly',-1)">← ก่อนหน้า</button>
      <span class="period-label" id="m-label"></span>
      <button id="m-next" onclick="shiftPeriod('monthly',1)">ถัดไป →</button>
    </div>
    <div class="grid3" id="m-cards"></div>
    <div class="form-card" id="m-bars"></div>
    <div class="cat-grid" id="m-cats"></div>
    <div class="section-title" id="m-table-title"></div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th>วันที่</th><th>ประเภท</th><th>หมวดหมู่</th><th>หมายเหตุ</th>
        <th class="right">จำนวน</th><th class="right">ยอดสะสม</th>
      </tr></thead>
      <tbody id="m-tbody"></tbody>
    </table></div>
  </div>

  <!-- YEARLY -->
  <div id="panel-yearly" class="panel">
    <div class="period-nav">
      <button id="y-prev" onclick="shiftPeriod('yearly',-1)">← ก่อนหน้า</button>
      <span class="period-label" id="y-label"></span>
      <button id="y-next" onclick="shiftPeriod('yearly',1)">ถัดไป →</button>
    </div>
    <div class="grid3" id="y-cards"></div>
    <div class="form-card" id="y-bars"></div>
    <div class="cat-grid" id="y-cats"></div>
    <div class="section-title" id="y-table-title"></div>
    <div class="table-wrap"><table>
      <thead><tr>
        <th>วันที่</th><th>ประเภท</th><th>หมวดหมู่</th><th>หมายเหตุ</th>
        <th class="right">จำนวน</th><th class="right">ยอดสะสม</th>
      </tr></thead>
      <tbody id="y-tbody"></tbody>
    </table></div>
  </div>
</div>

<script>
// ── Storage ──────────────────────────────────────────────────────────────────
const KEY = 'finance-tracker-v1';
let records = [];

function load() {
  try { records = JSON.parse(localStorage.getItem(KEY)) || []; } catch { records = []; }
}
function save() {
  localStorage.setItem(KEY, JSON.stringify(records));
}

// ── Helpers ──────────────────────────────────────────────────────────────────
const fmt = n => new Intl.NumberFormat('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
const fmtDate = d => new Date(d).toLocaleDateString('th-TH',{day:'2-digit',month:'short',year:'numeric'});
const todayStr = () => new Date().toISOString().slice(0,10);
const monthKey = d => d.slice(0,7);
const yearKey  = d => d.slice(0,4);

// ── State ────────────────────────────────────────────────────────────────────
let selDate = todayStr();
let mIdx = 0, yIdx = 0;

// ── Enriched records with cumulative balance ──────────────────────────────
function getEnriched() {
  const sorted = [...records].sort((a,b) => a.date.localeCompare(b.date) || a.id - b.id);
  let cum = 0;
  const enriched = sorted.map(r => {
    cum += r.type === 'income' ? r.amount : -r.amount;
    return { ...r, cumBalance: cum };
  });
  return enriched.reverse(); // newest first
}

// ── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => {
    b.classList.toggle('active', ['daily','monthly','yearly'][i] === tab);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  render();
}

// ── Add / Delete ──────────────────────────────────────────────────────────────
function addRecord(type) {
  const amount = parseFloat(document.getElementById('f-amount').value);
  if (!amount || amount <= 0) return alert('กรุณากรอกจำนวนเงิน');
  records.push({
    id: Date.now(),
    date: document.getElementById('f-date').value,
    type,
    amount,
    category: document.getElementById('f-cat').value,
    note: document.getElementById('f-note').value,
  });
  save();
  document.getElementById('f-amount').value = '';
  document.getElementById('f-note').value = '';
  render();
}

function deleteRecord(id) {
  records = records.filter(r => r.id !== id);
  save();
  render();
}

// ── Day navigation ─────────────────────────────────────────────────────────
function shiftDay(n) {
  const d = new Date(selDate);
  d.setDate(d.getDate() + n);
  selDate = d.toISOString().slice(0,10);
  render();
}

// ── Period navigation ──────────────────────────────────────────────────────
function shiftPeriod(mode, n) {
  if (mode === 'monthly') mIdx = Math.max(0, mIdx - n);
  else yIdx = Math.max(0, yIdx - n);
  render();
}

// ── Period keys ───────────────────────────────────────────────────────────
function getPeriodKeys(mode) {
  const enriched = getEnriched();
  const keys = [...new Set(enriched.map(r => mode === 'monthly' ? monthKey(r.date) : yearKey(r.date)))];
  return keys.sort().reverse();
}

// ── Label ─────────────────────────────────────────────────────────────────
function labelFor(k, mode) {
  if (!k) return '—';
  if (mode === 'yearly') return `ปี ${+k + 543}`;
  const [y,m] = k.split('-');
  return new Date(+y, +m-1).toLocaleDateString('th-TH',{month:'long',year:'numeric'});
}

// ── Summary cards HTML ────────────────────────────────────────────────────
function cardsHTML(totalIn, totalOut, cumBal, labelSuffix) {
  const bal = totalIn - totalOut;
  const balColor = bal >= 0 ? 'var(--blue)' : 'var(--orange)';
  const balValColor = bal >= 0 ? 'var(--blue2)' : 'var(--orange)';
  return `
    <div class="card" style="border-color:#22c55e33">
      <div class="card-accent" style="background:linear-gradient(90deg,#22c55e,#22c55e88)"></div>
      <div class="card-label">รายรับ${labelSuffix}</div>
      <div class="card-value color-green">฿${fmt(totalIn)}</div>
    </div>
    <div class="card" style="border-color:#ef444433">
      <div class="card-accent" style="background:linear-gradient(90deg,#ef4444,#ef444488)"></div>
      <div class="card-label">รายจ่าย${labelSuffix}</div>
      <div class="card-value color-red">฿${fmt(totalOut)}</div>
    </div>
    <div class="card" style="border-color:${balColor}33">
      <div class="card-accent" style="background:linear-gradient(90deg,${balColor},${balColor}88)"></div>
      <div class="card-label">คงเหลือ${labelSuffix}</div>
      <div class="card-value" style="color:${balValColor}">฿${fmt(bal)}</div>
      <div class="card-sub">ยอดสะสมรวม: ฿${fmt(cumBal)}</div>
    </div>`;
}

// ── Bar chart HTML ────────────────────────────────────────────────────────
function barsHTML(rows, title) {
  if (!rows.length) return '';
  const maxV = Math.max(...rows.map(r => Math.max(r.in, r.out)), 1);
  let h = `<div class="form-title">📊 ${title}</div>`;
  rows.forEach(row => {
    const pIn  = (row.in  / maxV * 100).toFixed(1);
    const pOut = (row.out / maxV * 100).toFixed(1);
    h += `<div style="margin-bottom:10px">
      <div style="font-size:11px;color:var(--muted);margin-bottom:3px">${row.label}</div>
      <div class="bar-row">
        <div class="bar-tag color-green">รับ</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pIn}%;background:#059669"></div></div>
        <div class="bar-val">฿${fmt(row.in)}</div>
      </div>
      <div class="bar-row">
        <div class="bar-tag color-red">จ่าย</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pOut}%;background:#dc2626"></div></div>
        <div class="bar-val">฿${fmt(row.out)}</div>
      </div>
    </div>`;
  });
  return h;
}

// ── Category breakdown HTML ───────────────────────────────────────────────
function catsHTML(recs) {
  const build = (type) => {
    const map = {};
    recs.filter(r => r.type === type).forEach(r => { map[r.category] = (map[r.category]||0) + r.amount; });
    const total = Object.values(map).reduce((s,v)=>s+v,0);
    const entries = Object.entries(map).sort((a,b)=>b[1]-a[1]);
    if (!entries.length) return `<div class="empty" style="padding:10px 0">ไม่มีข้อมูล</div>`;
    return entries.map(([cat,amt]) => {
      const pct = total ? (amt/total*100).toFixed(1) : 0;
      const col = type === 'income' ? '#059669' : '#dc2626';
      const textCol = type === 'income' ? 'color-green' : 'color-red';
      return `<div class="cat-row">
        <div class="cat-row-header">
          <span class="color-muted">${cat}</span>
          <span class="${textCol}">฿${fmt(amt)}</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
      </div>`;
    }).join('');
  };
  return `
    <div class="form-card">
      <div class="form-title">💚 หมวดรายรับ</div>${build('income')}
    </div>
    <div class="form-card">
      <div class="form-title">❤️ หมวดรายจ่าย</div>${build('expense')}
    </div>`;
}

// ── Period table rows ─────────────────────────────────────────────────────
function periodTableRows(recs) {
  if (!recs.length) return `<tr><td colspan="6" class="empty">ไม่มีรายการ</td></tr>`;
  return recs.map(r => `
    <tr>
      <td style="color:#9ca3af;font-size:12px">${fmtDate(r.date)}</td>
      <td><span class="badge badge-${r.type}">${r.type==='income'?'รายรับ':'รายจ่าย'}</span></td>
      <td>${r.category}</td>
      <td style="color:var(--muted)">${r.note||'—'}</td>
      <td class="right" style="font-weight:600;color:${r.type==='income'?'var(--green2)':'var(--red2)'}">${r.type==='income'?'+':'−'}฿${fmt(r.amount)}</td>
      <td class="right" style="color:var(--blue2);font-size:12px">฿${fmt(r.cumBalance)}</td>
    </tr>`).join('');
}

// ── Render ────────────────────────────────────────────────────────────────
function render() {
  const enriched = getEnriched();

  // ---- Daily ----
  document.getElementById('day-label').textContent =
    new Date(selDate).toLocaleDateString('th-TH',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  const dayRecs = enriched.filter(r => r.date === selDate);
  const dayIn  = dayRecs.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
  const dayOut = dayRecs.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
  const dayBal = enriched.find(r => r.date <= selDate);
  const cumBal = dayBal ? dayBal.cumBalance : 0;

  document.getElementById('day-cards').innerHTML = cardsHTML(dayIn, dayOut, cumBal, '');

  // Day table
  document.getElementById('day-tbody').innerHTML = dayRecs.length
    ? dayRecs.map(r=>`<tr>
        <td><span class="badge badge-${r.type}">${r.type==='income'?'รายรับ':'รายจ่าย'}</span></td>
        <td>${r.category}</td>
        <td style="color:var(--muted)">${r.note||'—'}</td>
        <td class="right" style="font-weight:600;color:${r.type==='income'?'var(--green2)':'var(--red2)'}">${r.type==='income'?'+':'−'}฿${fmt(r.amount)}</td>
        <td class="right" style="color:var(--blue2);font-size:12px">฿${fmt(r.cumBalance)}</td>
        <td><button class="del-btn" onclick="deleteRecord(${r.id})">✕</button></td>
      </tr>`).join('')
    : `<tr><td colspan="6" class="empty">ไม่มีรายการในวันที่เลือก</td></tr>`;

  // All records table
  document.getElementById('all-tbody').innerHTML = enriched.length
    ? enriched.map(r=>`<tr>
        <td style="color:#9ca3af;font-size:12px">${fmtDate(r.date)}</td>
        <td><span class="badge badge-${r.type}">${r.type==='income'?'รายรับ':'รายจ่าย'}</span></td>
        <td>${r.category}</td>
        <td style="color:var(--muted)">${r.note||'—'}</td>
        <td class="right" style="font-weight:600;color:${r.type==='income'?'var(--green2)':'var(--red2)'}">${r.type==='income'?'+':'−'}฿${fmt(r.amount)}</td>
        <td class="right" style="color:var(--blue2);font-size:12px">฿${fmt(r.cumBalance)}</td>
        <td><button class="del-btn" onclick="deleteRecord(${r.id})">✕</button></td>
      </tr>`).join('')
    : `<tr><td colspan="7" class="empty">ยังไม่มีรายการ</td></tr>`;

  // ---- Monthly ----
  renderPeriod('monthly', enriched);

  // ---- Yearly ----
  renderPeriod('yearly', enriched);
}

function renderPeriod(mode, enriched) {
  const prefix = mode === 'monthly' ? 'm' : 'y';
  const keys = getPeriodKeys(mode);
  let idx = mode === 'monthly' ? mIdx : yIdx;

  // Clamp idx
  idx = Math.max(0, Math.min(idx, keys.length - 1));
  if (mode === 'monthly') mIdx = idx; else yIdx = idx;

  const curKey = keys[idx];

  document.getElementById(`${prefix}-label`).textContent = curKey ? labelFor(curKey, mode) : '—';
  document.getElementById(`${prefix}-prev`).disabled = idx >= keys.length - 1;
  document.getElementById(`${prefix}-next`).disabled = idx <= 0;

  if (!keys.length) {
    document.getElementById(`${prefix}-cards`).innerHTML = '';
    document.getElementById(`${prefix}-bars`).innerHTML = '';
    document.getElementById(`${prefix}-cats`).innerHTML = '';
    document.getElementById(`${prefix}-tbody`).innerHTML = `<tr><td colspan="6" class="empty">ยังไม่มีข้อมูล</td></tr>`;
    return;
  }

  const pRecs = enriched.filter(r => (mode==='monthly'?monthKey(r.date):yearKey(r.date)) === curKey);
  const pIn   = pRecs.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
  const pOut  = pRecs.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
  const pCum  = pRecs.length ? pRecs[0].cumBalance : 0;

  const sfx = mode === 'monthly' ? 'รายเดือน' : 'รายปี';
  document.getElementById(`${prefix}-cards`).innerHTML = cardsHTML(pIn, pOut, pCum, sfx);
  document.getElementById(`${prefix}-cats`).innerHTML  = catsHTML(pRecs);
  document.getElementById(`${prefix}-table-title`).textContent = `📋 รายการทั้งหมดใน${labelFor(curKey,mode)}`;
  document.getElementById(`${prefix}-tbody`).innerHTML = periodTableRows(pRecs);

  // Sub breakdown
  const subMap = {};
  pRecs.forEach(r => {
    const k = mode === 'monthly' ? r.date : monthKey(r.date);
    subMap[k] = subMap[k] || { in: 0, out: 0 };
    if (r.type === 'income') subMap[k].in += r.amount;
    else subMap[k].out += r.amount;
  });

  const subRows = Object.entries(subMap).sort((a,b)=>b[0].localeCompare(a[0])).map(([k,v])=>{
    let label;
    if (mode === 'monthly') {
      label = fmtDate(k);
    } else {
      const [y,m] = k.split('-');
      label = new Date(+y,+m-1).toLocaleDateString('th-TH',{month:'short',year:'2-digit'});
    }
    return { label, in: v.in, out: v.out };
  });

  const barTitle = mode === 'monthly' ? 'รายได้/รายจ่ายรายวัน' : 'รายได้/รายจ่ายรายเดือน';
  document.getElementById(`${prefix}-bars`).innerHTML = barsHTML(subRows, barTitle);
}

// ── Init ──────────────────────────────────────────────────────────────────
load();
document.getElementById('f-date').value = todayStr();
render();
</script>
